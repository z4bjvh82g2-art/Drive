<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Racing Game</title>
<style>
    body { margin: 0; background: #222; font-family: Arial; color: white; }
    canvas { display: block; margin: auto; background: #2e8b57; }
    #menu {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }
    button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>Racing Game</h1>

    <h3>Select Track</h3>
    <button onclick="selectTrack('spa')">Spa</button>
    <button onclick="selectTrack('monaco')">Monaco</button>
    <button onclick="selectTrack('nurburgring')">Nürburgring</button>

    <h3>Select Car</h3>
    <button onclick="selectCar('balanced')">Balanced</button>
    <button onclick="selectCar('fast')">Fast</button>
    <button onclick="selectCar('grip')">Grip</button>

    <br><br>
    <button onclick="startGame()">Start Race</button>
</div>

<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameStarted = false;

// =========================
// Tracks
// =========================
const tracks = {
    spa: [
        [150,300],[300,150],[600,200],[750,350],
        [650,500],[300,520],[150,420]
    ],
    monaco: [
        [200,300],[300,200],[500,200],[650,300],
        [600,450],[400,500],[250,450]
    ],
    nurburgring: [
        [150,350],[300,200],[600,180],[750,350],
        [700,520],[400,580],[200,500]
    ]
};

let currentTrack = tracks.spa;

// =========================
// Cars
// =========================
const carTypes = {
    balanced: {acc:0.2, maxSpeed:5, grip:0.95},
    fast: {acc:0.3, maxSpeed:7, grip:0.9},
    grip: {acc:0.18, maxSpeed:4.5, grip:0.98}
};

let selectedCar = carTypes.balanced;

// =========================
// Car Class
// =========================
class Car {
    constructor(x, y, color, stats) {
        this.x = x;
        this.y = y;
        this.angle = 0;
        this.speed = 0;

        this.acc = stats.acc;
        this.maxSpeed = stats.maxSpeed;
        this.grip = stats.grip;

        this.rpm = 1000;
        this.gear = 1;

        this.health = 100;
        this.targetWP = 0;
        this.color = color;
    }

    updateEngine() {
        this.rpm = 1000 + Math.abs(this.speed) * 800;

        if (this.rpm > 6500 && this.gear < 5) {
            this.gear++;
            this.rpm = 4000;
        } else if (this.rpm < 2000 && this.gear > 1) {
            this.gear--;
            this.rpm = 3000;
        }
    }

    physics() {
        const fx = Math.cos(this.angle * Math.PI/180);
        const fy = -Math.sin(this.angle * Math.PI/180);

        this.x += fx * this.speed;
        this.y += fy * this.speed;

        this.speed *= this.grip;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(-this.angle * Math.PI/180);
        ctx.fillStyle = this.color;
        ctx.fillRect(-18, -9, 36, 18);
        ctx.restore();
    }
}

let player, ai;

// =========================
// Menu Functions
// =========================
function selectTrack(name) {
    currentTrack = tracks[name];
}

function selectCar(name) {
    selectedCar = carTypes[name];
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    gameStarted = true;

    player = new Car(200, 350, "red", selectedCar);
    ai = new Car(230, 370, "blue", carTypes.balanced);
}

// =========================
// Input
// =========================
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// =========================
// AI
// =========================
function aiDrive(car) {
    const target = currentTrack[car.targetWP];

    const dx = target[0] - car.x;
    const dy = target[1] - car.y;

    const targetAngle = Math.atan2(-dy, dx) * 180 / Math.PI;
    let diff = ((targetAngle - car.angle + 180) % 360) - 180;

    car.angle += diff * 0.08;
    car.speed += car.acc;

    car.speed = Math.min(car.speed, car.maxSpeed);
    car.physics();

    if (Math.hypot(dx, dy) < 40) {
        car.targetWP = (car.targetWP + 1) % currentTrack.length;
    }
}

// =========================
// UI
// =========================
function drawUI() {
    ctx.fillStyle = "white";
    ctx.fillText("RPM: " + Math.floor(player.rpm), 10, 20);
    ctx.fillText("Gear: " + player.gear, 10, 40);
    ctx.fillText("Health: " + player.health + "%", 10, 60);
}

// =========================
// Game Loop
// =========================
function gameLoop() {
    ctx.fillStyle = "#2e8b57";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!gameStarted) {
        requestAnimationFrame(gameLoop);
        return;
    }

    // Track
    ctx.strokeStyle = "#ccc";
    ctx.lineWidth = 40;
    ctx.beginPath();
    ctx.moveTo(currentTrack[0][0], currentTrack[0][1]);
    for (let i = 1; i < currentTrack.length; i++) {
        ctx.lineTo(currentTrack[i][0], currentTrack[i][1]);
    }
    ctx.closePath();
    ctx.stroke();

    // Controls
    if (keys["ArrowUp"]) player.speed += player.acc;
    if (keys["ArrowDown"]) player.speed -= player.acc;
    if (keys["ArrowLeft"]) player.angle += 4;
    if (keys["ArrowRight"]) player.angle -= 4;

    player.speed = Math.max(-2, Math.min(player.speed, player.maxSpeed));

    player.updateEngine();
    player.physics();

    aiDrive(ai);
    ai.updateEngine();

    // Collision
    if (Math.hypot(player.x - ai.x, player.y - ai.y) < 30) {
        player.health -= 0.5;
        player.speed *= -0.3;
    }

    player.draw();
    ai.draw();
    drawUI();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
